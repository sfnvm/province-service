# Rendered from ~/sauces/k8s/configs/platform-guardrails/namespace-template.yaml (province).
apiVersion: v1
kind: Namespace
metadata:
  name: province
  labels:
    # Onboard to the Istio ambient mesh → automatic mTLS east-west (no sidecar).
    istio.io/dataplane-mode: ambient
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: quota
  namespace: province
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: province
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
