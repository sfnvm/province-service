spring:
  application:
    name: province
  datasource:
    url: jdbc:postgresql://postgres-rw.postgres.svc.cluster.local:5432/app
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.10
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://alloy.monitoring.svc.cluster.local:4318/v1/traces

server:
  shutdown: graceful

logging:
  structured:
    format:
      console: ecs   # JSON to stdout with trace_id/span_id
