name: build-and-deploy

# Runs on a GitHub-hosted runner that connects to the cluster over WireGuard
# (private Harbor + API server are not public), then builds, pushes to Harbor,
# and rolls the Deployment to the new image.
#
# Required repo secrets:
#   HARBOR_USERNAME / HARBOR_PASSWORD  – Harbor robot account (not admin)
#   WG_CONFIG                          – WireGuard client conf (the github-actions peer)
#   KUBE_CONFIG_B64                    – base64-encoded kubeconfig (reachable over WG)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  IMAGE: harbor.sfnvm.com:9443/library/province-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Test
        run: ./gradlew --no-daemon test

      - name: Connect WireGuard
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG }}
        run: |
          sudo apt-get update && sudo apt-get install -y wireguard-tools
          printf '%s' "$WG_CONFIG" | sudo tee /etc/wireguard/wg0.conf >/dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "10.8.0.1 harbor.sfnvm.com" | sudo tee -a /etc/hosts >/dev/null

      - name: Log in to Harbor
        # Secrets are read as env vars (not inlined) so the `$` in the Harbor robot
        # name (robot$github-actions-library) is not treated as a shell expansion.
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: echo "$HARBOR_PASSWORD" | docker login harbor.sfnvm.com:9443 -u "$HARBOR_USERNAME" --password-stdin

      - name: Build and push
        # Only the immutable sha tag — this Harbor's `library` project silently
        # drops `latest`, and the Deploy step rolls by sha anyway.
        run: |
          TAG="${GITHUB_SHA::7}"
          docker build --platform linux/amd64 -t "$IMAGE:$TAG" .
          docker push "$IMAGE:$TAG"

      - name: Deploy
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          TAG="${GITHUB_SHA::7}"
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          # Assumes the Deployment already exists (first roll-out is manual per k8s/README.md).
          kubectl -n province set image deploy/province-service province-service="$IMAGE:$TAG"
          kubectl -n province rollout status deploy/province-service --timeout=180s

      - name: Tear down
        if: always()
        run: |
          docker logout harbor.sfnvm.com:9443 || true
          sudo wg-quick down wg0 || true
